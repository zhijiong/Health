<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#f5f2eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meal Plan">
<title>Meal Plan</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f2eb;--card:#fffffe;--border:#e4ded2;--blt:#eee9de;--text:#302d26;--sub:#615a4b;--muted:#9e9584;--faint:#c5bdb0;--acc:#687a58;--acc-lt:#ecf1e8;--acc-dk:#556948;--warm:#b8935a;--warm-lt:#faf3e8;--serif:'Newsreader',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif;--r:18px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg)}
body{font-family:var(--sans);color:var(--text);max-width:430px;margin:0 auto;min-height:100dvh;padding-bottom:92px;-webkit-font-smoothing:antialiased;letter-spacing:.01em}
button{cursor:pointer;font-family:var(--sans);border:none;background:none}img{display:block}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.up{animation:up .5s cubic-bezier(.16,1,.3,1) both}
.d1{animation-delay:50ms}.d2{animation-delay:100ms}.d3{animation-delay:150ms}.d4{animation-delay:200ms}.d5{animation-delay:250ms}

/* Picker */
.picker{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px}
.picker.hide{display:none}
.pk-logo{width:72px;height:72px;border-radius:18px;overflow:hidden;margin-bottom:28px;box-shadow:0 4px 24px rgba(96,110,82,.25);animation:pop .5s ease both}
.pk-logo img{width:100%;height:100%}
.pk-t{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--text);animation:up .5s ease .1s both}
.pk-s{font-family:var(--serif);font-size:15px;color:var(--muted);font-style:italic;margin:6px 0 40px;animation:up .5s ease .15s both}
.pk-cards{display:flex;gap:16px;width:100%;max-width:340px}
.pk-card{flex:1;background:var(--card);border-radius:24px;padding:32px 16px 28px;text-align:center;border:2px solid var(--blt);box-shadow:0 2px 16px rgba(48,45,38,.06);transition:all .3s cubic-bezier(.16,1,.3,1);animation:up .5s ease both}
.pk-card:first-child{animation-delay:.2s}.pk-card:last-child{animation-delay:.28s}
.pk-card:active{transform:scale(.94);border-color:var(--acc);box-shadow:0 4px 28px rgba(104,122,88,.18)}
.pk-av{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:40px}
.pk-nm{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px}
.pk-h{font-size:11px;color:var(--faint);font-weight:500;letter-spacing:.5px}

/* Header */
.hdr{padding:50px 22px 16px;position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 0%,var(--bg) 80%,transparent)}
.hdr-row{display:flex;align-items:center;gap:14px}
.hdr-logo{width:36px;height:36px;border-radius:9px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(96,110,82,.18)}
.hdr-logo img{width:100%;height:100%}
.hdr-tag{font-size:9.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--acc);opacity:.6}
.hdr-title{font-family:var(--serif);font-size:25px;font-weight:700;color:var(--text);margin-top:1px}
.hdr-user{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--blt);border-radius:20px;padding:5px 12px 5px 7px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.hdr-user-av{font-size:17px}
.hdr-user-nm{font-size:11px;font-weight:700;color:var(--text)}
.hdr-div{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0 22px}

/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:20;background:rgba(245,242,235,.85);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid rgba(228,222,210,.5);display:flex;padding:0 2px env(safe-area-inset-bottom)}
.nb{flex:1;padding:10px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .12s;position:relative}
.nb:active{transform:scale(.88)}
.ni{font-size:20px;transition:transform .25s cubic-bezier(.16,1,.3,1)}.ni.on{transform:scale(1.15) translateY(-1px)}
.nl{font-size:9px;font-weight:600;letter-spacing:.6px;color:var(--muted);transition:color .2s}.nl.on{color:var(--acc);font-weight:700}
.ndt{width:14px;height:2.5px;border-radius:2px;background:var(--acc);margin-top:2px;animation:pop .2s ease both}
.nbg{position:absolute;top:4px;right:50%;margin-right:-16px;min-width:14px;height:14px;border-radius:7px;background:#c07a5a;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}
.ct{padding:16px 18px 0;display:none}.ct.on{display:block}
.toast{position:fixed;top:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#ddd2be;padding:11px 24px;border-radius:26px;font-size:13px;font-weight:600;z-index:100;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.18);animation:pop .25s ease both;display:none}
.ring{position:relative;display:flex;align-items:center;justify-content:center}
.ring-n{position:absolute;font-family:var(--serif);font-weight:600}

/* Today */
.t-hero{background:var(--card);border-radius:var(--r);padding:26px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(48,45,38,.05);border:1px solid var(--blt)}
.t-greet{font-family:var(--serif);font-size:14px;color:var(--muted);font-style:italic}
.t-day{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--text);letter-spacing:-1px;margin-top:4px;line-height:1}
.t-sub{font-size:12px;color:var(--faint);margin-top:8px;font-weight:500}

/* Meal Card */
.mc{background:var(--card);border-radius:var(--r);margin-bottom:16px;overflow:hidden;box-shadow:0 1px 4px rgba(48,45,38,.04);border:1px solid var(--blt)}
.mc-top{padding:18px 20px 0;display:flex;align-items:flex-start;gap:14px}
.mc-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.mc-info{flex:1}
.mc-tag{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.mc-tag-dot{width:5px;height:5px;border-radius:50%}
.mc-name{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--text);margin-top:5px;line-height:1.3}
.mc-ck{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;margin-top:4px}
.mc-body{padding:12px 20px 20px}
.mc-desc{font-size:13.5px;color:var(--sub);line-height:1.85;margin-bottom:16px}
.mc-list{list-style:none;margin-bottom:16px;display:flex;flex-direction:column;gap:2px}
.mc-list li{font-size:13.5px;color:var(--sub);line-height:1.55;padding:6px 0 6px 0;display:flex;align-items:baseline;gap:9px;border-bottom:1px solid #f7f3ec}
.mc-list li:last-child{border-bottom:none}
.mc-list li .mc-li-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.mc-list li .mc-li-text{flex:1}
.mc-btn{width:100%;padding:14px;border:1.5px dashed var(--border);border-radius:14px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.mc-btn:active{transform:scale(.97);background:var(--bg)}
.mc-img-w{border-radius:14px;overflow:hidden;border:1px solid var(--blt)}
.mc-img{width:100%;max-height:200px;object-fit:cover}
.mc-meta{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#faf8f3}
.mc-time{font-size:11px;color:var(--muted);font-family:var(--serif);font-style:italic}
.mc-re{font-size:11px;font-weight:600;color:var(--sub);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 14px}
.mc-re:active{background:var(--bg)}
.prep{background:linear-gradient(135deg,#363229,#454136);border-radius:var(--r);padding:20px 22px;display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;box-shadow:0 4px 18px rgba(48,45,38,.1)}
.prep.sm{padding:16px 18px;margin-top:2px}
.prep-ic{font-size:18px;flex-shrink:0;margin-top:1px}
.prep-lb{font-size:9.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#bfb490;margin-bottom:4px}
.prep-tx{font-size:13.5px;color:#d8cfbc;line-height:1.75}

/* Week */
.wk-bar{display:flex;gap:6px;margin-bottom:22px}
.wk-p{flex:1;padding:14px 4px 11px;border-radius:14px;border:1.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.03);transition:all .25s}
.wk-p:active{transform:scale(.92)}
.wk-p.on{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.wk-pd{font-family:var(--serif);font-size:15px;font-weight:700}
.wk-dots{display:flex;gap:3px}
.wk-dt{width:6px;height:6px;border-radius:50%;transition:background .3s}
.wk-sec{margin-bottom:24px;animation:up .45s cubic-bezier(.16,1,.3,1) both}
.wk-sh{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.wk-sn{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-size:19px;font-weight:700;flex-shrink:0}

/* Shop */
.sh-hero{background:var(--card);border-radius:var(--r);padding:24px;margin-bottom:6px;box-shadow:0 2px 12px rgba(48,45,38,.05);border:1px solid var(--blt);display:flex;align-items:center;justify-content:space-between}
.sh-t{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--text)}
.sh-s{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500}
.sh-bar{height:3px;background:var(--blt);border-radius:2px;margin:12px 8px 20px;overflow:hidden}
.sh-bf{height:100%;background:linear-gradient(90deg,var(--acc),#9aad88);border-radius:2px;transition:width .6s cubic-bezier(.16,1,.3,1)}
.sh-g{background:var(--card);border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.03);border:1px solid var(--blt)}
.sh-gh{padding:14px 20px 12px;border-bottom:1px solid var(--blt);display:flex;justify-content:space-between;align-items:center}
.sh-gn{font-size:14px;font-weight:700;color:var(--text)}
.sh-gc{font-size:11px;font-weight:600}
.sh-r{padding:12px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f5f1e8;cursor:pointer;transition:background .12s}
.sh-r:last-child{border-bottom:none}
.sh-r:active{background:#f0ece2}
.sh-r.dn{background:#f8faf6}
.sh-c{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px;font-weight:700;color:transparent}
.sh-c.on{background:var(--acc);border-color:var(--acc);color:#fff}
.sh-ic{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.sh-tx{flex:1;font-size:13px;color:var(--sub);line-height:1.5}
.sh-tx .sh-item{font-weight:600;color:var(--text)}
.sh-tx .sh-note{font-size:11.5px;color:var(--muted);margin-top:1px;display:block}
.sh-r.dn .sh-tx .sh-item{color:var(--faint);text-decoration:line-through;font-weight:500}
.sh-r.dn .sh-tx .sh-note{color:var(--faint);text-decoration:line-through}
.sh-rst{width:100%;padding:15px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:600;color:var(--sub);margin:6px 0 10px}
.sh-rst:active{background:var(--bg);transform:scale(.98)}

/* Friend */
.fr-card{background:var(--card);border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(48,45,38,.05);border:1px solid var(--blt)}
.fr-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.fr-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.fr-name{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text)}
.fr-sub{font-size:12px;color:var(--muted);margin-top:2px}
.fr-label{font-size:9.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);margin-bottom:12px}
.fr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.fr-cell{text-align:center}
.fr-cell-d{font-family:var(--serif);font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px}
.fr-dot{width:11px;height:11px;border-radius:50%;margin:0 auto 3px}
.fr-dot-l{font-size:7px;color:var(--faint);letter-spacing:.5px}
.fr-share{width:100%;padding:14px;background:var(--acc);color:#fff;border-radius:14px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 3px 14px rgba(104,122,88,.2);transition:all .15s}
.fr-share:active{transform:scale(.97);background:var(--acc-dk)}
.fr-div{text-align:center;padding:20px 0;font-size:12px;color:var(--faint);font-family:var(--serif);font-style:italic;display:flex;align-items:center;gap:14px}
.fr-div::before,.fr-div::after{content:'';flex:1;height:1px;background:var(--blt)}
.fr-empty{text-align:center;padding:28px 20px}.fr-empty-ic{font-size:40px;margin-bottom:10px;opacity:.5}
.fr-empty-tx{font-size:13px;color:var(--muted);line-height:1.8}
.fr-ro{background:var(--card);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.03);border:1px solid var(--blt)}
.fr-ro-h{display:flex;align-items:center;gap:10px}
.fr-ro-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.fr-ro-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.fr-ro-nm{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--text);margin-top:2px}
.fr-ro-ck{margin-left:auto;font-size:11px;font-weight:600;color:var(--acc)}
.gl-label{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin:22px 0 12px;display:flex;align-items:center;gap:8px}.gl-label::after{content:'';flex:1;height:1px;background:var(--blt)}
.gl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gl-c{border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid var(--blt);animation:up .45s cubic-bezier(.16,1,.3,1) both}
.gl-c img{width:100%;height:130px;object-fit:cover}
.gl-ci{padding:10px 12px}.gl-cn{font-size:11px;font-weight:700}.gl-ct2{font-size:9.5px;color:var(--muted);margin-top:2px;font-family:var(--serif);font-style:italic}
.wknd{text-align:center;padding:60px 28px}
.wknd-ic{font-size:56px;margin-bottom:16px}
.wknd-t{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--text);margin-bottom:10px}
.wknd-s{font-size:15px;color:var(--sub);line-height:1.8;font-family:var(--serif);font-style:italic}
</style>
</head>
<body>
<div class="picker" id="picker">
  <div class="pk-logo"><img src="icon.png" alt=""></div>
  <div class="pk-t">Meal Plan</div>
  <div class="pk-s">Who's cooking today?</div>
  <div class="pk-cards">
    <button class="pk-card" onclick="pickUser('joey')">
      <div class="pk-av" style="background:#ecf1e8">🍋</div>
      <div class="pk-nm">Joey</div>
      <div class="pk-h">Tap to enter</div>
    </button>
    <button class="pk-card" onclick="pickUser('becky')">
      <div class="pk-av" style="background:#f3edf6">🫐</div>
      <div class="pk-nm">Becky</div>
      <div class="pk-h">Tap to enter</div>
    </button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="hdr"><div class="hdr-row">
    <div class="hdr-logo"><img src="icon.png" alt=""></div>
    <div><div class="hdr-tag">Mediterranean · <span id="wk-lb"></span></div><div class="hdr-title">Meal Plan</div></div>
    <button class="hdr-user" onclick="logout()" id="hdr-user"></button>
  </div></div>
  <div class="hdr-div"></div>
  <div id="t0" class="ct on"></div><div id="t1" class="ct"></div><div id="t2" class="ct"></div><div id="t3" class="ct"></div>
  <nav class="nav" id="nav"></nav>
</div>
<div class="toast" id="toast"></div>

<script>
const U={joey:{nm:'Joey',av:'🍋',bg:'#ecf1e8'},becky:{nm:'Becky',av:'🫐',bg:'#f3edf6'}};
const C=[
  {bg:"#687a58",lt:"#ecf1e8",tx:"#5d7050",gd:"linear-gradient(135deg,#687a58,#8ba07a)"},
  {bg:"#c09858",lt:"#faf3e7",tx:"#a8843e",gd:"linear-gradient(135deg,#c09858,#d4b070)"},
  {bg:"#6a82a0",lt:"#ecf0f5",tx:"#5a7290",gd:"linear-gradient(135deg,#6a82a0,#8ea4bc)"},
  {bg:"#987494",lt:"#f3edf2",tx:"#846480",gd:"linear-gradient(135deg,#987494,#b292ae)"},
  {bg:"#c07a58",lt:"#f8efe9",tx:"#a86848",gd:"linear-gradient(135deg,#c07a58,#d49878)"},
];
const DN=['Mon','Tue','Wed','Thu','Fri'];
const DAYS=[
  {day:"Monday",dn2:"Mon",b:{e:"🥛",n:"Yogurt Bowl · ~290 kcal",d:"Green Valley low-fat lactose-free yogurt (170g) + homemade granola (20g, no sugar) + 85% dark chocolate (10g) + pistachio butter (8g)"},l:{e:"🥣",n:"Steel-Cut Oats + Cod · ~455 kcal",d:"Steel-cut oats (50g dry / ~150g cooked) + soy milk (100ml) + black sesame paste (8g) + pan-seared cod (160g) + massaged kale (80g) + cherry tomatoes (100g)"},dn:{e:"🧀",n:"Burrata Farro Bowl · ~605 kcal",d:"Torn burrata (125g, Ball 1) + farro (50g dry / ~150g cooked) + roasted cherry tomatoes (200g) + baby spinach (60g) + extra virgin olive oil (1.5 tsp) + lemon juice + fresh basil + sea salt + black pepper"},p:"Daily total ~1665 kcal (meals + Starbucks tall latte 2% + soy tea + fruit)"},

    DAYS.forEach((d,i)=>{const c=C[i];const fd=MK.filter(m=>fCI[i+'_'+m]).length;if(!fd)return;
      h+=`<div style="font-family:var(--serif);font-size:15px;font-weight:600;color:${c.tx};margin:14px 0 8px;display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:${c.bg}"></div>${d.day}</div>`;
      MK.forEach(mk=>{const has=fCI[i+'_'+mk],meal=d[mk];if(!has)return;
        h+=`<div class="fr-ro"><div class="fr-ro-h"><div class="fr-ro-ic" style="background:${c.lt}">${meal.e}</div><div><div class="fr-ro-tag" style="color:${c.tx}">${MI[mk]} ${ML[mk]}</div><div class="fr-ro-nm">${meal.n}</div></div><div class="fr-ro-ck">✓</div></div>${has.photo?'<div style="margin-top:10px"><img src="'+has.photo+'" style="width:100%;max-height:180px;object-fit:cover;border-radius:12px;border:1px solid var(--blt)"></div>':''}</div>`})});
  }else{
    h+=`<div class="fr-empty up d2"><div class="fr-empty-ic">👯</div><div class="fr-empty-tx">No updates from ${fu.nm} yet<br><br>Ask ${fu.nm} to open the app and tap<br>"Share progress" — then open the link they send you<br><br><span style="font-size:11px;color:var(--faint)">On the same device? ${fu.nm} can just<br>switch profiles by tapping the name badge</span></div></div>`}
  // Friend photos
  const fAll=[];DAYS.forEach((d,i)=>MK.forEach(m=>{const k=i+'_'+m;if(fCI[k]&&fCI[k].photo)fAll.push({day:d.dn2,meal:ML[m],di:i,...fCI[k]})}));
  if(fAll.length){h+=`<div class="gl-label up d3">📸 ${fu.nm}'s Check-ins</div><div class="gl-grid">`;fAll.forEach((c,i)=>{const col=C[c.di];h+=`<div class="gl-c" style="animation-delay:${i*40+200}ms"><img src="${c.photo}"><div class="gl-ci" style="background:${col.lt}"><div class="gl-cn" style="color:${col.tx}">${c.day} · ${c.meal}</div><div class="gl-ct2">${c.time}</div></div></div>`});h+='</div>'}
  // My photos
  const all=[];DAYS.forEach((d,i)=>MK.forEach(m=>{const k=i+'_'+m;if(myCI[k]&&myCI[k].photo)all.push({day:d.dn2,meal:ML[m],di:i,...myCI[k]})}));
  if(all.length){h+=`<div class="gl-label up d4">📸 My Check-ins</div><div class="gl-grid">`;all.forEach((c,i)=>{const col=C[c.di];h+=`<div class="gl-c" style="animation-delay:${i*40+250}ms"><img src="${c.photo}"><div class="gl-ci" style="background:${col.lt}"><div class="gl-cn" style="color:${col.tx}">${c.day} · ${c.meal}</div><div class="gl-ct2">${c.time}</div></div></div>`});h+='</div>'}
  el.innerHTML=h}

function rNav(){const all=Object.values(SHOP).flat(),shR=all.length-all.filter(i=>mySC[i]).length;const badge=shR>0&&shR<all.length?shR:0;
  const tabs=[{ic:'☀️',lb:'Today'},{ic:'📅',lb:'Week'},{ic:'🛒',lb:'Shop',badge},{ic:'👯',lb:U[fr()].nm}];
  document.getElementById('nav').innerHTML=tabs.map((t,i)=>`<button class="nb" onclick="sw(${i})"><span class="ni${tab===i?' on':''}">${t.ic}</span><span class="nl${tab===i?' on':''}">${t.lb}</span>${tab===i?'<div class="ndt"></div>':''}${t.badge?`<div class="nbg">${t.badge}</div>`:''}</button>`).join('')}
function sw(t){document.getElementById('t'+tab).classList.remove('on');tab=t;document.getElementById('t'+tab).classList.add('on');if(t===3){cloudLoadFriend().then(()=>r3())}render()}
function render(){document.getElementById('wk-lb').textContent='Week '+wk;document.getElementById('hdr-user').innerHTML=`<span class="hdr-user-av">${U[user].av}</span><span class="hdr-user-nm">${U[user].nm}</span>`;r0();r1();r2();r3();rNav()}
function cleanOldWeeks(){
  try{
    var ver='v2_apr13';
    if(localStorage.getItem('mp_ver')!==ver){
      var keys=Object.keys(localStorage);
      keys.forEach(function(k){
        if(k.indexOf('_ci_w')!==-1||k.indexOf('_sc_w')!==-1||k.indexOf('_sp_w')!==-1)localStorage.removeItem(k);
      });
      localStorage.setItem('mp_ver',ver);
    }
    var keys2=Object.keys(localStorage);
    keys2.forEach(function(k){
      var m=k.match(/_w(\d+)$/);
      if(m&&parseInt(m[1])<wk)localStorage.removeItem(k);
    });
  }catch(e){}
}
function startApp(){document.getElementById('picker').classList.add('hide');document.getElementById('app').style.display='block';cleanOldWeeks();ld();checkSync();render();cloudLoadFriend().then(()=>r3())}
checkSync();const sv=localStorage.getItem('mp_user');if(sv&&U[sv]){user=sv;startApp()}
const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.style.display='none';inp.id='fup';
inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
  const img=new Image();const url=URL.createObjectURL(f);
  img.onload=()=>{
    const MAX=480;let w=img.width,h=img.height;
    if(w>MAX||h>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    const photo=cv.toDataURL('image/jpeg',0.55);
    myCI[pDi+'_'+pMk]={photo,time:new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})};
    try{svCI();toast('Checked in 🎉')}catch(err){toast('Storage full');delete myCI[pDi+'_'+pMk]}
    render();
  };
  img.src=url;e.target.value='';
};
document.body.appendChild(inp);
</script>
