<style>
:root {
  --bg: #f6f3ed;
  --card: #fff;
  --border: #e8e2d6;
  --border-light: #f0ebe0;
  --text: #33302a;
  --sub: #6e6556;
  --muted: #a69e8e;
  --accent: #637a56;
  --accent-light: #eef3eb;
  --warm: #c2985a;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --shadow-sm: 0 1px 3px rgba(51,48,42,.04), 0 1px 2px rgba(51,48,42,.02);
  --shadow: 0 2px 12px rgba(51,48,42,.06);
  --shadow-lg: 0 8px 30px rgba(51,48,42,.08);
  --radius: 16px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background: var(--bg); }
body {
  font-family: var(--sans);
  color: var(--text);
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: 88px;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
button { cursor:pointer; font-family:var(--sans); border:none; background:none; }
img { display:block; }

/* Grain overlay */
body::after {
  content:'';
  position:fixed; top:0; left:0; right:0; bottom:0;
  pointer-events:none; z-index:9999; opacity:.018;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── Animations ── */
@keyframes enter { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes scaleIn { from { opacity:0; transform:scale(.96) } to { opacity:1; transform:scale(1) } }
@keyframes ringDraw { from { stroke-dashoffset: var(--circ) } to { stroke-dashoffset: var(--offset) } }
.enter { animation: enter .45s cubic-bezier(.22,1,.36,1) both; }
.enter-1 { animation-delay: 40ms }
.enter-2 { animation-delay: 80ms }
.enter-3 { animation-delay: 120ms }
.enter-4 { animation-delay: 160ms }
.enter-5 { animation-delay: 200ms }

/* ── Header ── */
.hdr {
  padding: 52px 22px 18px;
  position: sticky; top:0; z-index:10;
  background: linear-gradient(180deg, var(--bg) 0%, var(--bg) 85%, transparent);
}
.hdr-inner {
  display: flex; align-items: center; gap: 14px;
}
.hdr-logo {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink:0;
  background: linear-gradient(135deg, #576f4e, #839572);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(87,111,78,.2);
}
.hdr-logo svg { width: 22px; height: 22px; }
.hdr-text {}
.hdr-tag {
  font-family: var(--sans);
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent); opacity:.7;
}
.hdr-title {
  font-family: var(--serif);
  font-size: 26px; font-weight: 700; color: var(--text);
  letter-spacing: -0.3px; margin-top: 1px;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 0 22px;
}

/* ── Nav ── */
.nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px; z-index:20;
  background: rgba(246,243,237,.88);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(232,226,214,.6);
  display:flex; padding: 0 4px;
  padding-bottom: env(safe-area-inset-bottom);
}
.n-btn {
  flex:1; padding:9px 0 7px;
  display:flex; flex-direction:column; align-items:center; gap:1px;
  transition: transform .15s;
  position: relative;
}
.n-btn:active { transform:scale(.9); }
.n-ic { font-size:20px; transition: transform .25s cubic-bezier(.22,1,.36,1); }
.n-ic.on { transform: scale(1.12) translateY(-1px); }
.n-lb { font-size:9.5px; font-weight:600; letter-spacing:.5px; color:var(--muted); transition:color .25s; }
.n-lb.on { color: var(--accent); font-weight:700; }
.n-line { width:16px; height:2.5px; border-radius:2px; background:var(--accent); margin-top:2px; animation: scaleIn .2s ease; }
.n-badge {
  position:absolute; top:5px; right:50%; margin-right:-16px;
  min-width:15px; height:15px; border-radius:8px;
  background:#c07a5a; color:#fff; font-size:8.5px; font-weight:700;
  display:flex; align-items:center; justify-content:center; padding:0 4px;
}

.content { padding: 14px 16px 0; }

/* ── Today Hero ── */
.t-hero {
  background: var(--card);
  border-radius: var(--radius); padding: 24px;
  margin-bottom: 18px;
  display: flex; align-items:center; justify-content:space-between;
  box-shadow: var(--shadow); border: 1px solid var(--border-light);
}
.t-greet { font-size:13px; color:var(--muted); font-weight:500; font-style:italic; font-family:var(--serif); }
.t-day { font-family:var(--serif); font-size:36px; font-weight:700; color:var(--text); letter-spacing:-1px; margin-top:2px; }
.t-sub { font-size:12px; color:var(--muted); margin-top:6px; font-weight:500; }
.t-ring { position:relative; display:flex; align-items:center; justify-content:center; }
.t-ring-num { position:absolute; font-family:var(--serif); font-size:17px; font-weight:700; color:var(--accent); }

/* ── Meal Card ── */
.mc {
  background: var(--card);
  border-radius: var(--radius); margin-bottom:12px;
  overflow:hidden;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  transition: box-shadow .2s;
}
.mc-head {
  padding: 15px 20px 13px;
  display:flex; align-items:center; justify-content:space-between;
}
.mc-head-l { display:flex; align-items:center; gap:12px; }
.mc-emoji { font-size:26px; }
.mc-tag {
  font-family:var(--sans);
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
}
.mc-name { font-family:var(--serif); font-size:18px; font-weight:700; color:var(--text); margin-top:1px; letter-spacing:-0.2px; }
.mc-done-badge {
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; color:#fff;
}
.mc-body { padding: 0 20px 18px; }
.mc-desc {
  font-size:14px; color:var(--sub); line-height:1.75;
  margin-bottom:14px; letter-spacing:.1px;
}
.mc-btn {
  width:100%; padding:13px;
  border: 1.5px dashed var(--border);
  border-radius:12px;
  font-size:13px; font-weight:600; color:var(--muted);
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition: all .2s;
}
.mc-btn:active { transform:scale(.97); background:#faf7f2; }
.mc-img { width:100%; border-radius:12px; object-fit:cover; max-height:200px; border:1px solid var(--border-light); }
.mc-meta { display:flex; justify-content:space-between; align-items:center; padding:10px 2px 0; }
.mc-time { font-size:11px; color:var(--muted); font-style:italic; font-family:var(--serif); }
.mc-re { font-size:11px; font-weight:600; color:var(--sub); background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:5px 12px; transition:background .15s; }
.mc-re:active { background:#ede7d9; }

/* ── Prep ── */
.prep {
  background: linear-gradient(135deg, #3a362e, #4a453b);
  border-radius: var(--radius); padding:18px 20px;
  display:flex; gap:14px; align-items:flex-start;
  margin-bottom:14px;
  box-shadow: 0 4px 16px rgba(51,48,42,.12);
}
.prep.compact { padding:14px 16px; margin-top:4px; }
.prep-ic { font-size:18px; flex-shrink:0; margin-top:2px; }
.prep-lb { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#c5b896; margin-bottom:3px; }
.prep-tx { font-size:13.5px; color:#ddd4c0; line-height:1.7; }

/* ── Week ── */
.wk-pills { display:flex; gap:5px; margin-bottom:20px; }
.wk-pill {
  flex:1; padding:13px 4px 10px;
  border-radius:14px; border:1.5px solid transparent;
  display:flex; flex-direction:column; align-items:center; gap:7px;
  background: var(--card);
  box-shadow: var(--shadow-sm);
  transition: all .25s;
}
.wk-pill:active { transform:scale(.93); }
.wk-pill.open { border-color:var(--accent); box-shadow:0 2px 12px rgba(99,122,86,.1); }
.wk-pill-d { font-family:var(--serif); font-size:16px; font-weight:700; }
.wk-pill-dots { display:flex; gap:3px; }
.wk-dot { width:6px; height:6px; border-radius:50%; transition:background .3s; }
.wk-hint { text-align:center; padding:36px 20px; }
.wk-hint-ic { font-size:40px; margin-bottom:10px; opacity:.6; }
.wk-hint-tx { font-size:14px; color:var(--muted); font-family:var(--serif); font-style:italic; }
.wk-section { margin-bottom:22px; animation:enter .4s cubic-bezier(.22,1,.36,1) both; }
.wk-sec-head { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
.wk-sec-num {
  width:40px; height:40px; border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:var(--serif); font-size:18px; font-weight:700; flex-shrink:0;
}
.wk-sec-day { font-family:var(--serif); font-size:20px; font-weight:700; color:var(--text); }
.wk-sec-sub { font-size:11px; font-weight:600; margin-top:2px; }

/* ── Shop ── */
.sh-hero {
  background: var(--card);
  border-radius: var(--radius); padding:22px 22px 18px;
  margin-bottom:14px;
  box-shadow: var(--shadow); border:1px solid var(--border-light);
  display:flex; align-items:center; justify-content:space-between;
}
.sh-title { font-family:var(--serif); font-size:24px; font-weight:700; color:var(--text); }
.sh-sub { font-size:12px; color:var(--muted); margin-top:3px; }
.sh-ring { position:relative; display:flex; align-items:center; justify-content:center; }
.sh-pct { position:absolute; font-family:var(--serif); font-size:14px; font-weight:700; color:var(--text); }
.sh-bar { height:3px; background:var(--border-light); border-radius:2px; margin:0 6px 18px; overflow:hidden; }
.sh-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),#94ab84); border-radius:2px; transition:width .5s cubic-bezier(.22,1,.36,1); }

.sh-group {
  background:var(--card); border-radius:var(--radius);
  margin-bottom:10px; overflow:hidden;
  box-shadow:var(--shadow-sm); border:1px solid var(--border-light);
}
.sh-g-head {
  padding:13px 18px 11px;
  border-bottom:1px solid var(--border-light);
  display:flex; justify-content:space-between; align-items:center;
}
.sh-g-name { font-size:14px; font-weight:700; color:var(--text); }
.sh-g-ct { font-size:11px; font-weight:600; }
.sh-row {
  padding:12px 18px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid #f7f3eb; cursor:pointer;
  transition: background .15s;
}
.sh-row:last-child { border-bottom:none; }
.sh-row:active { background:#f3efe6; }
.sh-row.done { background:#f7faf6; }
.sh-ck {
  width:22px; height:22px; border-radius:6px;
  border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .2s;
  font-size:12px; font-weight:700; color:transparent;
}
.sh-ck.on { background:var(--accent); border-color:var(--accent); color:#fff; }
.sh-txt { font-size:13.5px; color:#44403a; line-height:1.55; }
.sh-row.done .sh-txt { color:var(--muted); text-decoration:line-through; }
.sh-reset {
  width:100%; padding:14px;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:var(--radius);
  font-size:13px; font-weight:600; color:var(--sub);
  margin:4px 0 8px; transition:all .2s;
}
.sh-reset:active { background:#f0ebe0; transform:scale(.98); }

/* ── Gallery ── */
.gl-hero {
  background:var(--card); border-radius:var(--radius);
  padding:24px; margin-bottom:18px;
  display:flex; align-items:center; gap:22px;
  box-shadow:var(--shadow); border:1px solid var(--border-light);
}
.gl-ct { font-family:var(--serif); font-size:36px; font-weight:700; color:var(--text); }
.gl-ct span { font-size:16px; font-weight:500; color:var(--muted); }
.gl-sub { font-size:13px; color:var(--muted); margin-top:3px; font-family:var(--serif); font-style:italic; }
.gl-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.gl-card {
  border-radius:14px; overflow:hidden;
  box-shadow:var(--shadow-sm); border:1px solid var(--border-light);
  animation:enter .4s cubic-bezier(.22,1,.36,1) both;
}
.gl-card img { width:100%; height:140px; object-fit:cover; }
.gl-info { padding:10px 12px; }
.gl-name { font-size:11.5px; font-weight:700; }
.gl-time { font-size:10px; color:var(--muted); margin-top:2px; font-family:var(--serif); font-style:italic; }

.empty { text-align:center; padding:50px 20px; }
.empty-ic { font-size:48px; margin-bottom:14px; }
.empty-t { font-family:var(--serif); font-size:22px; font-weight:700; color:var(--text); margin-bottom:8px; }
.empty-s { font-size:14px; color:var(--sub); line-height:1.8; font-family:var(--serif); font-style:italic; }

/* ── Toast ── */
.toast {
  position:fixed; top:88px; left:50%; transform:translateX(-50%);
  background:var(--text); color:#ddd4c0;
  padding:10px 22px; border-radius:24px;
  font-size:13px; font-weight:600;
  z-index:100; white-space:nowrap;
  box-shadow:0 6px 24px rgba(0,0,0,.18);
  animation:scaleIn .25s ease both;
}

/* ── Weekend ── */
.wknd { text-align:center; padding:60px 28px; }
.wknd-ic { font-size:56px; margin-bottom:16px; }
.wknd-t { font-family:var(--serif); font-size:24px; font-weight:700; color:var(--text); margin-bottom:10px; }
.wknd-s { font-size:15px; color:var(--sub); line-height:1.8; font-family:var(--serif); font-style:italic; }
</style>
</head>

      <svg viewBox="0 0 40 40" fill="none" stroke="#ffffffdd" stroke-width="1.8" stroke-linecap="round">
        <path d="M20,30 C20,30 12,14 20,4 C28,14 20,30 20,30Z" fill="#ffffff30"/>

<div class="divider"></div>

<!-- Nav -->
<nav class="nav" id="nav"></nav>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

<script>

const C = [

const DAYS = [
  {day:"周一",breakfast:{e:"🥛",n:"酸奶碗",d:"Green Valley低脂无乳糖酸奶 + 自烤Granola（无糖轻喷油）+ 黑巧克力 + 开心果酱"},lunch:{e:"🎒",n:"蒸红薯 + 三文鱼",d:"蒸红薯块 + 早上现煎三文鱼 + 按摩kale + cherry tomatoes + 油醋汁"},dinner:{e:"🍤",n:"蒜蓉黄油虾 + Farro",d:"蒜蓉黄油虾 + 炒菠菜 + 烤红椒 + farro"},prep:"煮一锅farro（今晚+明天午餐）、烤红椒、煮溏心蛋2个"},
  {day:"周二",breakfast:{e:"🥛",n:"酸奶碗",d:"Green Valley低脂无乳糖酸奶 + 自烤Granola（无糖轻喷油）+ 黑巧克力 + 开心果酱"},lunch:{e:"🎒",n:"Farro + 溏心蛋",d:"Farro + 溏心蛋2个 + 烤红椒 + kale + 油醋汁 + 葵花籽"},dinner:{e:"🍅",n:"番茄蛋花豆腐汤 + 红薯",d:"番茄 + 嫩豆腐 + 鸡蛋 + 葱花，配一个蒸红薯"},prep:"煮钢切燕麦（明天午餐）、虾解冻"},
  {day:"周三",breakfast:{e:"🥛",n:"酸奶碗",d:"Green Valley低脂无乳糖酸奶 + 自烤Granola（无糖轻喷油）+ 黑巧克力 + 开心果酱"},lunch:{e:"🎒",n:"钢切燕麦 + 虾仁",d:"钢切燕麦（豆奶+酒酿+黑芝麻酱）+ 早上现炒虾仁 + 黄瓜丁 + cherry tomatoes + 橄榄油柠檬汁"},dinner:{e:"🍣",n:"烤三文鱼 + Farro",d:"烤三文鱼（200°C 12分钟）+ 烤芦笋 + farro + 柠檬汁"},prep:"煮一锅farro（今晚+明天午餐）、腌鸡腿肉（过夜）"},
  {day:"周四",breakfast:{e:"🥛",n:"酸奶碗",d:"Green Valley低脂无乳糖酸奶 + 自烤Granola（无糖轻喷油）+ 黑巧克力 + 开心果酱"},lunch:{e:"🎒",n:"Farro + 鸡腿肉",d:"Farro + 早上现煎鸡腿肉切片 + kale + 黄瓜 + 油醋汁 + 葵花籽"},dinner:{e:"🍄",n:"蘑菇菠菜豆腐汤 + 紫薯",d:"蘑菇 + 菠菜 + 嫩豆腐 + 一点香油 + 葱花，配一个蒸紫薯"},prep:"蒸一个大紫薯（晚餐吃半个，另一半留明天午餐）、三文鱼解冻"},
  {day:"周五",breakfast:{e:"🥛",n:"酸奶碗",d:"Green Valley低脂无乳糖酸奶 + 自烤Granola（无糖轻喷油）+ 黑巧克力 + 开心果酱"},lunch:{e:"🎒",n:"蒸紫薯 + 三文鱼",d:"蒸紫薯 + 早上现煎三文鱼 + kale + cherry tomatoes + 油醋汁"},dinner:{e:"🎉",n:"烤西葫芦Burrata意面",d:"西葫芦切片煎至金黄 + 蒜 + 橄榄油 + 柠檬汁柠檬皮屑 + 拌意面 + 撕开一整颗burrata铺上 + 新鲜罗勒 + 黑胡椒 + 一点点海盐"},prep:null},
];

const SHOP = {
  "🐟 Seafood":["三文鱼 salmon fillet × 3块（周一午、周三晚、周五午）","虾 shrimp peeled × 250g（周一晚~150g、周三午~80g）"],
  "🍗 Meat & Eggs":["鸡腿肉 boneless chicken thigh × 1块（周四午）","鸡蛋 × 4个（溏心蛋2个+周二汤1个+备用1个）"],
  "🥛 Dairy / 酱":["Green Valley 低脂无乳糖酸奶（大桶，每日早餐）","黄油 unsalted butter（周一晚虾用）","豆奶（周三钢切燕麦用）","开心果酱 pistachio butter（每日早餐）","黑芝麻酱（周三钢切燕麦用）","Burrata × 1个（周五意面用）"],
  "🌾 主食":["Farro（煮两批：周一晚/周二午、周三晚/周四午）","钢切燕麦 steel-cut oats（周三午）","意面 × 1包（周五晚）","Granola 原料或无糖成品（每日早餐）","葵花籽 sunflower seeds（周二午、周四午）","酒酿（周三钢切燕麦用）"],
  "🥦 蔬菜":["Kale × 1大把（周一二四五午餐，量大可买两把）","Baby spinach 菠菜 × 1袋（周一晚、周四汤）","Cherry tomatoes × 2盒（周一三五午餐）","芦笋 asparagus × 1把（周三晚）","红椒 red bell pepper × 2个（周一晚、周二午）","黄瓜 cucumber × 2根（周三午、周四午）","西葫芦 zucchini × 1根（周五意面）","番茄 × 2个（周二汤）","蘑菇 mushrooms × 1盒（周四汤）","嫩豆腐 × 2盒（周二汤、周四汤）","葱 × 1把（周二汤、周四汤）","大蒜 garlic × 1头","柠檬 lemon × 2个（周三午晚共用1个、周五意面1个）","新鲜罗勒 basil × 1小把（周五意面）"],
  "🍠 薯类":["红薯 × 2个（周一午、周二晚各一个）","紫薯 × 1个大的（周四晚+周五午共享）"],
  "🍑 水果 + 饮品":["时令水果自选（每日加餐）","伯爵茶/阿萨姆茶包（自制奶茶）","85% 黑巧克力（每日早餐）"],
  "🫙 Pantry补货":["特级初榨橄榄油 EVOO","香油（周四汤用）","Balsamic vinegar（油醋汁用）"],
};

const MK=['breakfast','lunch','dinner'], ML={breakfast:'早餐',lunch:'午餐',dinner:'晚餐'}, MI={breakfast:'morning',lunch:'noon',dinner:'evening'};
const START=new Date('2026-04-06');
const weekNum=(()=>{const d=new Date()-START;return d<0?1:Math.floor(d/6048e5)+1;})();
const todayIdx=(()=>{const d=new Date().getDay();return d>=1&&d<=5?d-1:-1;})();
const greet=(()=>{const h=new Date().getHours();return h<12?'早上好':h<18?'下午好':'晚上好';})();

let tab='today', ckIns={}, shopCk={}, openDays={};

// Persistence
function load(){try{ckIns=JSON.parse(localStorage.getItem('ci_w'+weekNum)||'{}');}catch{}try{shopCk=JSON.parse(localStorage.getItem('sh_w'+weekNum)||'{}');}catch{}}
function saveCi(){try{localStorage.setItem('ci_w'+weekNum,JSON.stringify(ckIns));}catch{}}
function saveSh(){try{localStorage.setItem('sh_w'+weekNum,JSON.stringify(shopCk));}catch{}}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2000);}

// SVG ring helper
function ring(pct, size=68, sw=4, color='#637a56'){
  const r=(size-sw)/2, circ=2*Math.PI*r, off=circ*(1-pct);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e8e2d6" stroke-width="${sw}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1)"/></svg>`;
}

// ── Meal Card HTML ──
function mcHTML(di,mk,meal,c,cls=''){
  const ci=ckIns[di+'_'+mk];
  const lbs={breakfast:'☀️ 早餐',lunch:'🍱 午餐',dinner:'🌙 晚餐'};
  let photo='';
  if(ci){
    photo=`<div style="margin-top:2px"><img class="mc-img" src="${ci.photo}" alt=""><div class="mc-meta"><span class="mc-time">${ci.time}</span><button class="mc-re" onclick="trigUp(${di},'${mk}')">重新拍照</button></div></div>`;
  } else {
    photo=`<button class="mc-btn" onclick="trigUp(${di},'${mk}')" style="border-color:${c.bg}40;color:${c.tx}"><span style="font-size:16px">📷</span>拍照打卡</button>`;
  }
  return `<div class="mc enter ${cls}">
    <div class="mc-head" style="background:${c.lt}">
      <div class="mc-head-l">
        <span class="mc-emoji">${meal.e}</span>
        <div><div class="mc-tag" style="color:${c.tx}">${lbs[mk]}</div><div class="mc-name">${meal.n}</div></div>
      </div>
      ${ci?`<div class="mc-done-badge" style="background:${c.gd}">✓</div>`:''}
    </div>
    <div class="mc-body"><div class="mc-desc">${meal.d}</div>${photo}</div>
  </div>`;
}

// ── Upload Logic ──
let pendDi=0,pendMk='';
function trigUp(di,mk){pendDi=di;pendMk=mk;document.getElementById('fup').click();}
document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';inp.style.display='none';inp.id='fup';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{ckIns[pendDi+'_'+pendMk]={photo:ev.target.result,time:new Date().toLocaleString('zh-CN')};saveCi();toast('打卡成功 🎉');render();};r.readAsDataURL(f);e.target.value='';};
  document.body.appendChild(inp);
});

// ── Render: Today ──
function renderToday(){
  const el=document.getElementById('t-today');
  if(todayIdx<0){el.innerHTML=`<div class="wknd enter"><div class="wknd-ic">🌿</div><div class="wknd-t">今天是周末</div><div class="wknd-s">好好休息！<br>记得提前备好下周的食材 😊</div></div>`;return;}
  const day=DAYS[todayIdx],c=C[todayIdx];
  const done=MK.filter(m=>ckIns[todayIdx+'_'+m]).length;
  let h=`
  <div class="t-hero enter">
    <div><div class="t-greet">${greet} ✦</div><div class="t-day">${day.day}</div><div class="t-sub">${done===3?'今日已全部打卡 ✓':`还剩 ${3-done} 餐待打卡`}</div></div>
    <div class="t-ring">${ring(done/3,68,4,c.bg)}<div class="t-ring-num" style="color:${c.tx}">${done}/3</div></div>
  </div>`;
  MK.forEach((mk,i)=>{h+=mcHTML(todayIdx,mk,day[mk],c,'enter-'+(i+1));});
  if(day.prep) h+=`<div class="prep enter enter-4"><div class="prep-ic">📝</div><div><div class="prep-lb">今晚顺手准备</div><div class="prep-tx">${day.prep}</div></div></div>`;
  el.innerHTML=h;
}

// ── Render: Week ──
function renderWeek(){
  const el=document.getElementById('t-week');
  let h='<div class="wk-pills enter">';
  DAYS.forEach((d,i)=>{
    const c=C[i],done=MK.filter(m=>ckIns[i+'_'+m]).length;
    h+=`<button class="wk-pill${openDays[i]?' open':''}" onclick="togDay(${i})" style="${openDays[i]?'background:'+c.lt:''}">
      <div class="wk-pill-d" style="color:${openDays[i]?c.tx:'var(--text)'}">${d.day.slice(1)}</div>
      <div class="wk-pill-dots">${[0,1,2].map(j=>`<div class="wk-dot" style="background:${done>j?c.bg:'#ddd6c8'}"></div>`).join('')}</div>
    </button>`;
  });
  h+='</div>';

  let anyOpen=false;
  DAYS.forEach((day,i)=>{
    if(!openDays[i])return;
    anyOpen=true;
    const c=C[i],done=MK.filter(m=>ckIns[i+'_'+m]).length;
    h+=`<div class="wk-section"><div class="wk-sec-head"><div class="wk-sec-num" style="background:${c.gd}">${i+1}</div><div><div class="wk-sec-day">${day.day}</div><div class="wk-sec-sub" style="color:${c.tx}">打卡 ${done}/3</div></div></div>`;
    MK.forEach((mk,j)=>{h+=mcHTML(i,mk,day[mk],c,'enter-'+(j+1));});
    if(day.prep) h+=`<div class="prep compact enter enter-4"><div class="prep-ic">📝</div><div><div class="prep-lb">顺手准备</div><div class="prep-tx">${day.prep}</div></div></div>`;
    h+='</div>';
  });
  if(!anyOpen) h+=`<div class="wk-hint enter enter-1"><div class="wk-hint-ic">👆</div><div class="wk-hint-tx">点击上方日期查看食谱</div></div>`;
  el.innerHTML=h;
}
function togDay(i){openDays[i]=!openDays[i];renderWeek();}

// ── Render: Shop ──
function renderShop(){
  const el=document.getElementById('t-shop');
  const all=Object.values(SHOP).flat(),tot=all.length,done=all.filter(i=>shopCk[i]).length,pct=tot?Math.round(done/tot*100):0;
  let h=`
  <div class="sh-hero enter">
    <div><div class="sh-title">Whole Foods</div><div class="sh-sub">采购清单 · ${done}/${tot} 项</div></div>
    <div class="sh-ring">${ring(done/tot,58,4,pct===100?'#637a56':'#c2985a')}<div class="sh-pct">${pct}%</div></div>
  </div>
  <div class="sh-bar enter enter-1"><div class="sh-bar-fill" style="width:${pct}%"></div></div>`;

  let ci=0;
  Object.entries(SHOP).forEach(([cat,items])=>{
    const cd=items.filter(i=>shopCk[i]).length,ca=cd===items.length;
    h+=`<div class="sh-group enter enter-${Math.min(ci+2,5)}"><div class="sh-g-head"><div class="sh-g-name">${cat}</div><div class="sh-g-ct" style="color:${ca?'var(--accent)':'var(--muted)'}">${cd}/${items.length}</div></div>`;
    items.forEach(item=>{
      const ck=!!shopCk[item],esc=item.replace(/'/g,"\\'");
      h+=`<div class="sh-row${ck?' done':''}" onclick="togSh('${esc}')"><div class="sh-ck${ck?' on':''}">${ck?'✓':''}</div><span class="sh-txt">${item}</span></div>`;
    });
    h+='</div>';ci++;
  });
  h+=`<button class="sh-reset" onclick="resetSh()">重置清单</button>`;
  if(pct===100) h+=`<div style="text-align:center;padding:10px 0 4px;font-size:13px;color:var(--accent);font-weight:600;font-family:var(--serif);font-style:italic">全部买齐了 🎉</div>`;
  el.innerHTML=h;
}
function togSh(item){shopCk[item]=!shopCk[item];saveSh();renderShop();renderNav();}
function resetSh(){shopCk={};saveSh();toast('购物清单已重置 ✓');renderShop();renderNav();}

// ── Render: Gallery ──
function renderGallery(){
  const el=document.getElementById('t-gallery');
  const all=[];
  DAYS.forEach((d,i)=>MK.forEach(m=>{const ck=i+'_'+m;if(ckIns[ck])all.push({day:d.day,meal:ML[m],di:i,...ckIns[ck]});}));
  const tot=DAYS.length*3,pct=tot?Math.round(all.length/tot*100):0;
  let h=`<div class="gl-hero enter">
    ${ring(all.length/tot,72,4,'#637a56')}
    <div><div class="gl-ct">${all.length}<span> / ${tot} 餐</span></div><div class="gl-sub">本周打卡记录</div></div>
  </div>`;
  if(!all.length){
    h+=`<div class="empty enter enter-1"><div class="empty-ic">🍽️</div><div class="empty-s">还没有打卡记录<br>去「今日」拍照打卡吧</div></div>`;
  } else {
    h+='<div class="gl-grid">';
    all.forEach((c,i)=>{const col=C[c.di];h+=`<div class="gl-card" style="animation-delay:${i*50}ms"><img src="${c.photo}" alt=""><div class="gl-info" style="background:${col.lt}"><div class="gl-name" style="color:${col.tx}">${c.day} · ${c.meal}</div><div class="gl-time">${c.time}</div></div></div>`;});
    h+='</div>';
  }
  el.innerHTML=h;
}

// ── Nav ──
function renderNav(){
  const allSh=Object.values(SHOP).flat(),shTot=allSh.length,shDone=allSh.filter(i=>shopCk[i]).length;
  const badge=shDone>0&&shDone<shTot?shTot-shDone:0;
  const tabs=[{k:'today',ic:'☀️',lb:'今日'},{k:'week',ic:'📅',lb:'本周'},{k:'shop',ic:'🛒',lb:'采购',badge},{k:'gallery',ic:'📸',lb:'打卡'}];
  document.getElementById('nav').innerHTML=tabs.map(t=>`
    <button class="n-btn" onclick="switchTab('${t.k}')">
      <span class="n-ic${tab===t.k?' on':''}">${t.ic}</span>
      <span class="n-lb${tab===t.k?' on':''}">${t.lb}</span>
      ${tab===t.k?'<div class="n-line"></div>':''}
      ${t.badge?`<div class="n-badge">${t.badge}</div>`:''}
    </button>
  `).join('');
}

function switchTab(t){
  document.getElementById('t-'+tab).style.display='none';
  tab=t;
  document.getElementById('t-'+tab).style.display='block';
  render();
}

function render(){
  document.getElementById('wk-label').textContent='第'+weekNum+'周';
  renderToday();renderWeek();renderShop();renderGallery();renderNav();
}

load();render();
</script>
</body>
</html>
